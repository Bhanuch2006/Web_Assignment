<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CityRide | Login</title>
<link rel="icon" href="images/logo.avif">
<link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

<header>
<div class="header-container">
<div class="logo">
<img src="images/logo.avif" alt="CityRide">
<span>CityRide</span>
</div>
<nav>
<a href="index.html">Login</a>
</nav>
</div>
</header>

<section id="login" class="card center-card">
<div class="login-card">
    <h2>Welcome</h2>
    <p class="login-subtitle">Sign in to manage your bookings in minutes.</p>
    <div class="form-box">
        <label>Name</label>
        <input type="text" id="loginName" placeholder="Your Name">
        
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="Your Email">
        
        <label class="check-row">
            <input type="checkbox" id="loginTerms">
            I agree to the terms and permissions
        </label>
        
        <p id="loginError" class="error-text"></p>
        
        <button onclick="handleLogin()" class="btn-submit">Enter Website</button>
    </div>
    <p class="login-hint">Need help? Contact our support team anytime.</p>
</div>
</section>

<footer class="footer-plain">© CityRide</footer>

<script src="script.js"></script>

</body>
</html>
